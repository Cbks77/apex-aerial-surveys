<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080E1A"/>
      <stop offset="100%" style="stop-color:#0D1B2E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CFFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00CFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="900" cy="315" rx="350" ry="280" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#00CFFF" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#00CFFF" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#00CFFF" stroke-width="0.5" opacity="0.08"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#00CFFF" stroke-width="0.5" opacity="0.08"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" rx="2" fill="#00CFFF" opacity="0.6"/>

  <!-- Drone SVG — large, right side -->
  <g transform="translate(780, 130) scale(3.2)">
    <line x1="50" y1="50" x2="20" y2="20" stroke="#00CFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <line x1="50" y1="50" x2="80" y2="20" stroke="#00CFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <line x1="50" y1="50" x2="20" y2="80" stroke="#00CFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <line x1="50" y1="50" x2="80" y2="80" stroke="#00CFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <ellipse cx="20" cy="20" rx="14" ry="5" fill="none" stroke="#00CFFF" stroke-width="2" opacity="0.5"/>
    <ellipse cx="80" cy="20" rx="14" ry="5" fill="none" stroke="#00CFFF" stroke-width="2" opacity="0.5"/>
    <ellipse cx="20" cy="80" rx="14" ry="5" fill="none" stroke="#00CFFF" stroke-width="2" opacity="0.5"/>
    <ellipse cx="80" cy="80" rx="14" ry="5" fill="none" stroke="#00CFFF" stroke-width="2" opacity="0.5"/>
    <rect x="38" y="38" width="24" height="24" rx="5" fill="#1C2A3A" stroke="#00CFFF" stroke-width="2"/>
    <circle cx="50" cy="52" r="5" fill="none" stroke="#FF6B35" stroke-width="2"/>
    <circle cx="50" cy="52" r="2" fill="#FF6B35"/>
    <circle cx="50" cy="43" r="2.5" fill="#00CFFF"/>
  </g>

  <!-- CAA badge -->
  <rect x="110" y="192" width="110" height="28" rx="14" fill="none" stroke="#00CFFF" stroke-width="1.5" opacity="0.5"/>
  <text x="165" y="211" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#00CFFF" text-anchor="middle" letter-spacing="2" opacity="0.8">CAA LICENSED</text>

  <!-- Main headline -->
  <text x="110" y="310" font-family="'Arial Black', 'Arial', sans-serif" font-size="68" font-weight="900" fill="#F0F4FF" letter-spacing="-1">APEX AERIAL</text>
  <text x="110" y="388" font-family="'Arial Black', 'Arial', sans-serif" font-size="68" font-weight="900" fill="#F0F4FF" letter-spacing="-1">SURVEYS</text>

  <!-- Blue accent under headline -->
  <rect x="110" y="400" width="200" height="4" rx="2" fill="#00CFFF"/>

  <!-- Tagline -->
  <text x="110" y="450" font-family="'Arial', sans-serif" font-size="22" font-weight="400" fill="#8A9BB0" letter-spacing="0.5">UAV Inspection &amp; Survey Specialists · Bristol, UK</text>

  <!-- Stats row -->
  <text x="110" y="520" font-family="'Arial', sans-serif" font-size="18" font-weight="700" fill="#00CFFF">500+ surveys</text>
  <text x="265" y="520" font-family="'Arial', sans-serif" font-size="18" fill="#1C2A3A">·</text>
  <text x="285" y="520" font-family="'Arial', sans-serif" font-size="18" font-weight="700" fill="#00CFFF">48hr reports</text>
  <text x="435" y="520" font-family="'Arial', sans-serif" font-size="18" fill="#1C2A3A">·</text>
  <text x="455" y="520" font-family="'Arial', sans-serif" font-size="18" font-weight="700" fill="#00CFFF">99.8% accuracy</text>

  <!-- Domain -->
  <text x="110" y="575" font-family="'Arial', sans-serif" font-size="18" fill="#8A9BB0" opacity="0.7">apexaerialsurveys.com</text>

  <!-- Orange dot accent -->
  <circle cx="1100" cy="560" r="8" fill="#FF6B35" opacity="0.8"/>
  <circle cx="1130" cy="545" r="5" fill="#FF6B35" opacity="0.4"/>
  <circle cx="1150" cy="565" r="3" fill="#FF6B35" opacity="0.25"/>
</svg>
